<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Parser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border-color: #dddddd;
            --error-color: #d32f2f;
            --button-bg: #2196F3;
            --button-hover: #1976D2;
        }

        [data-theme="dark"] {
            --bg-primary: #1e1e1e;
            --bg-secondary: #252526;
            --text-primary: #d4d4d4;
            --text-secondary: #9d9d9d;
            --border-color: #3e3e42;
            --error-color: #f48771;
            --button-bg: #0e639c;
            --button-hover: #1177bb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
            overflow: hidden;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 6px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        [data-theme="dark"] ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        [data-theme="dark"] ::-webkit-scrollbar-thumb {
            background: #4a4a4a;
        }

        [data-theme="dark"] ::-webkit-scrollbar-thumb:hover {
            background: #5a5a5a;
        }

        header {
            background-color: var(--bg-secondary);
            padding: 0.4rem 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        h1 {
            font-size: 1rem;
            font-weight: 600;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            line-height: 1;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .theme-toggle:active {
            transform: scale(0.95);
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            display: flex;
            flex-direction: column;
            padding: 1rem;
            min-width: 200px;
            overflow: hidden;
        }

        .panel.left {
            padding-right: 0.5rem;
        }

        .panel.right {
            flex: 1;
            padding-left: 0.5rem;
        }

        .panel.left {
            width: 50%;
        }

        .panel-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        textarea, pre {
            flex: 1;
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.9rem;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            resize: none;
            overflow: auto;
        }

        textarea:focus {
            outline: 2px solid var(--button-bg);
            outline-offset: -2px;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .error {
            color: var(--error-color);
            padding: 1rem;
            border: 1px solid var(--error-color);
            border-radius: 4px;
            background-color: var(--bg-secondary);
        }

        .divider {
            width: 2px;
            background-color: transparent;
            cursor: col-resize;
            position: relative;
            flex-shrink: 0;
        }

        .json-key { color: #0451a5; }
        [data-theme="dark"] .json-key { color: #9cdcfe; }

        .json-string { color: #a31515; }
        [data-theme="dark"] .json-string { color: #ce9178; }

        .json-number { color: #098658; }
        [data-theme="dark"] .json-number { color: #b5cea8; }

        .json-boolean { color: #0000ff; }
        [data-theme="dark"] .json-boolean { color: #569cd6; }

        .json-null { color: #0000ff; }
        [data-theme="dark"] .json-null { color: #569cd6; }

        /* Collapsible tree */
        .json-tree {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .json-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border: 1px solid var(--border-color);
            border-radius: 2px;
            cursor: pointer;
            user-select: none;
            color: var(--text-secondary);
            font-size: 12px;
            line-height: 1;
            vertical-align: middle;
            margin-right: 3px;
            flex-shrink: 0;
            background: var(--bg-primary);
        }

        .json-toggle:hover {
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }

        .json-children {
            padding-left: 1.4em;
            border-left: 1px solid var(--border-color);
            margin-left: 0.2em;
        }

        .json-children.collapsed {
            display: none;
        }

        .json-collapsed-hint {
            color: var(--text-secondary);
            font-style: italic;
            font-size: 0.85em;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>JSON Parser</h1>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">
            <span id="themeIcon">🌙</span>
        </button>
    </header>

    <div class="container">
        <div class="panel left" id="leftPanel">
            <div class="panel-title">Input JSON</div>
            <textarea id="jsonInput" placeholder="Paste your JSON here..."></textarea>
        </div>

        <div class="divider" id="divider"></div>

        <div class="panel right" id="rightPanel">
            <div class="panel-title">Formatted Output</div>
            <pre id="jsonOutput"><span style="color:var(--text-secondary)">Formatted JSON will appear here...</span></pre>
        </div>
    </div>

    <script>
        const jsonInput = document.getElementById('jsonInput');
        const jsonOutput = document.getElementById('jsonOutput');
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const divider = document.getElementById('divider');
        const leftPanel = document.getElementById('leftPanel');
        const container = document.querySelector('.container');

        // Theme
        function getSystemTheme() {
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        function updateThemeIcon(theme) {
            themeIcon.textContent = theme === 'dark' ? '☀️' : '🌙';
        }
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            updateThemeIcon(theme);
        }
        const savedTheme = localStorage.getItem('theme');
        applyTheme(savedTheme || getSystemTheme());
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('theme')) applyTheme(e.matches ? 'dark' : 'light');
        });
        themeToggle.addEventListener('click', () => {
            const newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // Resizable divider
        let isResizing = false;
        divider.addEventListener('mousedown', () => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
        });
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const rect = container.getBoundingClientRect();
            const pct = ((e.clientX - rect.left) / rect.width) * 100;
            if (pct >= 20 && pct <= 80) leftPanel.style.width = pct + '%';
        });
        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
        });

        // JSON tree renderer
        let uid = 0;

        function esc(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function renderVal(val, isLast) {
            const trail = isLast ? '' : ',';
            if (val === null) return `<span class="json-null">null</span>${trail}`;
            const t = typeof val;
            if (t === 'boolean') return `<span class="json-boolean">${val}</span>${trail}`;
            if (t === 'number') return `<span class="json-number">${val}</span>${trail}`;
            if (t === 'string') return `<span class="json-string">"${esc(val)}"</span>${trail}`;
            if (t === 'object') return renderObj(val, isLast);
            return esc(String(val)) + trail;
        }

        function renderObj(obj, isLast) {
            const isArr = Array.isArray(obj);
            const open = isArr ? '[' : '{';
            const close = isArr ? ']' : '}';
            const keys = isArr ? null : Object.keys(obj);
            const len = isArr ? obj.length : keys.length;
            const trail = isLast ? '' : ',';

            if (len === 0) return `${open}${close}${trail}`;

            const id = 'n' + (++uid);
            const hint = isArr ? `${len} item${len > 1 ? 's' : ''}` : `${len} key${len > 1 ? 's' : ''}`;

            let rows = '';
            if (isArr) {
                obj.forEach((item, i) => {
                    rows += `<div>${renderVal(item, i === len - 1)}</div>`;
                });
            } else {
                keys.forEach((k, i) => {
                    rows += `<div><span class="json-key">"${esc(k)}"</span>: ${renderVal(obj[k], i === len - 1)}</div>`;
                });
            }

            return `${open}<span class="json-toggle" data-id="${id}" title="Collapse">&#8722;</span>` +
                   `<span id="${id}h" class="json-collapsed-hint" data-id="${id}" style="display:none"> ${hint} </span>` +
                   `<span id="${id}c" style="display:none">${close}${trail}</span>` +
                   `<div class="json-children" id="${id}">${rows}</div>` +
                   `<span id="${id}e">${close}${trail}</span>`;
        }

        function bindToggles() {
            jsonOutput.querySelectorAll('.json-toggle, .json-collapsed-hint').forEach(el => {
                el.addEventListener('click', function () {
                    const id = this.getAttribute('data-id');
                    const children = document.getElementById(id);
                    const hint = document.getElementById(id + 'h');
                    const inlineClose = document.getElementById(id + 'c');
                    const endClose = document.getElementById(id + 'e');
                    const toggle = jsonOutput.querySelector('.json-toggle[data-id="' + id + '"]');
                    const collapsed = children.classList.toggle('collapsed');
                    toggle.classList.toggle('collapsed', collapsed);
                    toggle.title = collapsed ? 'Expand' : 'Collapse';
                    toggle.innerHTML = collapsed ? '&#43;' : '&#8722;';
                    hint.style.display = collapsed ? '' : 'none';
                    inlineClose.style.display = collapsed ? '' : 'none';
                    endClose.style.display = collapsed ? 'none' : '';
                });
            });
        }

        function parseJSON() {
            const input = jsonInput.value.trim();
            if (!input) {
                jsonOutput.innerHTML = '<span style="color:var(--text-secondary)">Formatted JSON will appear here...</span>';
                jsonOutput.className = '';
                return;
            }
            try {
                uid = 0;
                const parsed = JSON.parse(input);
                jsonOutput.innerHTML = '<div class="json-tree">' + renderVal(parsed, true) + '</div>';
                jsonOutput.className = '';
                bindToggles();
            } catch (e) {
                jsonOutput.innerHTML = '<div class="error"><strong>Error:</strong> ' + esc(e.message) + '</div>';
                jsonOutput.className = 'error';
            }
        }

        jsonInput.addEventListener('input', parseJSON);
        parseJSON();
    </script>
</body>
</html>
